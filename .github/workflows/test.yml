name: English Learning Town - Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Frontend React/TypeScript Tests
  frontend-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./react-client
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: react-client/package-lock.json
        
    - name: Install dependencies
      run: npm ci
      
    - name: Lint code
      run: npm run lint
      
    - name: Build project
      run: npm run build
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      run: npm test
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: react-client/playwright-report/
        retention-days: 30
        
    - name: Upload test videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-videos
        path: react-client/test-results/
        retention-days: 30

  # Backend Go Tests
  backend-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend-go
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: backend-go/go.sum
        
    - name: Install dependencies
      run: go mod download
      
    - name: Run tests
      run: go test -v ./...
      
    - name: Run tests with coverage
      run: go test -v -coverprofile=coverage.out ./...
      
    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html
      
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: go-coverage-report
        path: backend-go/coverage.html
        retention-days: 30

  # Integration Tests
  integration-test:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: english_learning_town_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: backend-go/go.sum
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: react-client/package-lock.json
        
    - name: Install backend dependencies
      working-directory: ./backend-go
      run: go mod download
      
    - name: Install frontend dependencies
      working-directory: ./react-client
      run: npm ci
      
    - name: Build frontend
      working-directory: ./react-client
      run: npm run build
      
    - name: Start backend server
      working-directory: ./backend-go
      run: |
        go build -o server ./cmd/main.go
        ./server &
        echo $! > server.pid
        sleep 5
      env:
        DB_PATH: ":memory:"
        PORT: "8080"
        
    - name: Install Playwright browsers
      working-directory: ./react-client
      run: npx playwright install --with-deps
      
    - name: Run E2E tests
      working-directory: ./react-client
      run: npm test
      env:
        PLAYWRIGHT_BASE_URL: http://localhost:5173
        
    - name: Stop backend server
      if: always()
      working-directory: ./backend-go
      run: |
        if [ -f server.pid ]; then
          kill $(cat server.pid) || true
          rm server.pid
        fi
        
    - name: Upload E2E test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-results
        path: react-client/test-results/
        retention-days: 30

  # Documentation Build Test
  docs-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./docs
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Install mdBook
      run: cargo install mdbook
      
    - name: Build documentation
      run: mdbook build
      
    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/book/
        retention-days: 30

  # Code Quality Checks
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: react-client/package-lock.json
        
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'
        cache-dependency-path: backend-go/go.sum
        
    - name: Install frontend dependencies
      working-directory: ./react-client
      run: npm ci
      
    - name: Run frontend linting
      working-directory: ./react-client
      run: npm run lint
      
    - name: Install Go tools
      working-directory: ./backend-go
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        
    - name: Run Go linting
      working-directory: ./backend-go
      run: |
        go fmt ./...
        go vet ./...
        staticcheck ./...
        golangci-lint run
      continue-on-error: true
      
    - name: Check Go mod tidy
      working-directory: ./backend-go
      run: |
        go mod tidy
        git diff --exit-code go.mod go.sum